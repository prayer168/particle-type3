<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>粒子文字 v3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080810; overflow: hidden; }
    canvas { display: block; }

    #ui {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #text-input {
      width: 600px;
      max-width: 92vw;
      min-height: 48px;
      max-height: 120px;
      padding: 12px 28px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      color: #fff;
      font-size: 18px;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      text-align: center;
      outline: none;
      resize: none;
      overflow-y: auto;
      backdrop-filter: blur(12px);
      transition: border-color 0.4s, box-shadow 0.4s;
      letter-spacing: 1px;
      line-height: 1.5;
    }
    #text-input:focus {
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
    }
    #text-input::placeholder { color: rgba(255, 255, 255, 0.16); }

    #hint {
      color: rgba(255, 255, 255, 0.12);
      font-size: 12px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <textarea id="text-input" placeholder="输入文字，按 Enter 换行…" maxlength="60" rows="1" spellcheck="false"></textarea>
    <span id="hint">支持中文与英文 · 可换行 · 15000 粒子</span>
  </div>

<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const input  = document.getElementById('text-input');

let W = 0, H = 0;

function resize() {
  const w = window.innerWidth  || document.documentElement.clientWidth  || 1280;
  const h = window.innerHeight || document.documentElement.clientHeight || 720;
  if (w === W && h === H) return;
  W = canvas.width  = w;
  H = canvas.height = h;
}
resize();
(function ensureSize() {
  if (W === 0 || H === 0) { resize(); requestAnimationFrame(ensureSize); }
})();
window.addEventListener('resize', () => {
  resize();
  if (input.value.trim()) scheduleAssign(input.value);
});

// ── Config ────────────────────────────────────────────────────────────────────
const COUNT    = 15000;
// Two-speed spring: fast approach from far, slow/dreamy when close
const SPRING_FAR  = 0.028;   // strong pull when > 80px away
const FRIC_FAR    = 0.80;
const SPRING_NEAR = 0.006;   // gentle drift when < 80px
const FRIC_NEAR   = 0.93;
const NEAR_DIST2  = 6400;    // 80px² threshold
const WANDER_F = 0.986;
const MOUSE_R  = 130;
const MOUSE_F  = 0.55;

// ── Mouse ─────────────────────────────────────────────────────────────────────
let mouseX = -9999, mouseY = -9999;
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

// ── Particles (flat typed arrays) ─────────────────────────────────────────────
const px = new Float32Array(COUNT);
const py = new Float32Array(COUNT);
const vx = new Float32Array(COUNT);
const vy = new Float32Array(COUNT);
const tx = new Float32Array(COUNT);   // -1 = no target
const ty = new Float32Array(COUNT);
const angle   = new Float32Array(COUNT);
const turnSpd = new Float32Array(COUNT);
const wandAcc = new Float32Array(COUNT);
const psize   = new Float32Array(COUNT);
const layer   = new Uint8Array(COUNT);

for (let i = 0; i < COUNT; i++) {
  px[i] = Math.random() * (W || 1280);
  py[i] = Math.random() * (H || 720);
  vx[i] = 0;  vy[i] = 0;
  tx[i] = -1; ty[i] = -1;
  angle[i]   = Math.random() * Math.PI * 2;
  turnSpd[i] = 0.004 + Math.random() * 0.006;
  wandAcc[i] = 0.003 + Math.random() * 0.004;
  psize[i]   = 0.7 + Math.random() * 1.0;
  layer[i]   = (Math.random() * 3) | 0;
}

// ── Text → pixel positions (multi-line) ───────────────────────────────────────
const FONT_FAM = '"Microsoft YaHei","PingFang SC","Hiragino Sans GB",Arial,sans-serif';

function samplePixels(text) {
  if (!text.trim()) return [];

  const lines = text.split('\n');
  while (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();
  if (lines.every(l => l.trim() === '')) return [];

  const oc   = document.createElement('canvas');
  oc.width   = W;
  oc.height  = H;
  const octx = oc.getContext('2d');

  const lineCount = lines.length;

  // ── Font sizing: start with vertical constraint, then shrink by measured width ──
  let fontSize = Math.min((H * 0.60) / (lineCount * 1.35), 200);

  // Binary search: find largest font where text fits within W * 0.85
  let lo = 18, hi = fontSize;
  while (hi - lo > 1) {
    const mid = (lo + hi) / 2;
    octx.font = `bold ${mid}px ${FONT_FAM}`;
    let fits = true;
    for (const line of lines) {
      if (line.trim() && octx.measureText(line).width > W * 0.85) {
        fits = false; break;
      }
    }
    if (fits) lo = mid; else hi = mid;
  }
  fontSize = Math.max(18, lo);
  octx.font = `bold ${fontSize}px ${FONT_FAM}`;

  const lineHeight = fontSize * 1.35;
  const totalH     = lineCount * lineHeight;
  const startY     = (H - totalH) / 2 + lineHeight * 0.5;

  octx.textAlign    = 'center';
  octx.textBaseline = 'middle';
  octx.fillStyle    = '#fff';

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim()) {
      octx.fillText(lines[i], W / 2, startY + i * lineHeight);
    }
  }

  // ── Scan pixels — low alpha threshold to capture anti-aliased strokes ──
  const { data } = octx.getImageData(0, 0, W, H);
  const pts = [];

  for (let y = 0; y < H; y += 2) {
    for (let x = 0; x < W; x += 2) {
      if (data[((y * W) + x) * 4 + 3] > 40) {
        pts.push(x, y);
      }
    }
  }

  // If too few points (tiny text), resample at step=1
  if ((pts.length >> 1) < COUNT * 0.3) {
    pts.length = 0;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        if (data[((y * W) + x) * 4 + 3] > 40) {
          pts.push(x, y);
        }
      }
    }
  }

  return pts;
}

// ── Shuffle flat paired array ─────────────────────────────────────────────────
function shufflePairs(arr) {
  const n = arr.length >> 1;
  for (let i = n - 1; i > 0; i--) {
    const j  = (Math.random() * (i + 1)) | 0;
    const ai = i * 2, aj = j * 2;
    let t = arr[ai];   arr[ai]   = arr[aj];   arr[aj]   = t;
        t = arr[ai+1]; arr[ai+1] = arr[aj+1]; arr[aj+1] = t;
  }
}

// ── Assignment: priority nearest-neighbor + grid-sort fallback ────────────────
//
//  Phase 1 — Settled particles (close to old target) get FIRST pick of nearby
//            new targets via local grid search (5×5 cells). This keeps formed
//            characters stable — particles don't move unless they have to.
//  Phase 2 — Remaining particles + targets matched via grid-sort fallback.
//
const ACELL    = 30;     // grid cell size for spatial lookup
const SEARCH_R = 2;      // search ±2 cells = 5×5 neighborhood = 150×150px

function assignTargets(text) {
  const pts       = samplePixels(text);
  const pairCount = pts.length >> 1;
  if (pairCount === 0) { clearTargets(); return; }

  shufflePairs(pts);

  // Build target pool for ALL particles
  const poolX    = new Float32Array(COUNT);
  const poolY    = new Float32Array(COUNT);
  const poolUsed = new Uint8Array(COUNT);
  for (let i = 0; i < COUNT; i++) {
    const src = (i % pairCount) * 2;
    const jit = i >= pairCount;
    poolX[i] = pts[src]     + (jit ? (Math.random() - 0.5) * 2.5 : 0);
    poolY[i] = pts[src + 1] + (jit ? (Math.random() - 0.5) * 2.5 : 0);
  }

  // Build spatial grid of targets
  const cols = Math.ceil(W / ACELL) || 1;
  const rows = Math.ceil(H / ACELL) || 1;
  const grid = new Array(cols * rows);
  for (let i = 0; i < grid.length; i++) grid[i] = [];
  for (let i = 0; i < COUNT; i++) {
    const c = Math.min(cols - 1, Math.max(0, (poolX[i] / ACELL) | 0));
    const r = Math.min(rows - 1, Math.max(0, (poolY[i] / ACELL) | 0));
    grid[r * cols + c].push(i);
  }

  // ── Phase 1: settled particles first, then in-flight ones ──
  //    Sort targeted particles by distance-to-target (closest = most settled = first pick)
  const targeted = [];
  for (let i = 0; i < COUNT; i++) {
    if (tx[i] < 0) continue;
    const dx = px[i] - tx[i], dy = py[i] - ty[i];
    targeted.push(i, dx * dx + dy * dy);  // [index, dist², index, dist², ...]
  }
  // Sort by dist² (ascending) — settled particles process first
  const order = [];
  for (let i = 0; i < targeted.length; i += 2) order.push(i >> 1);
  order.sort((a, b) => targeted[a * 2 + 1] - targeted[b * 2 + 1]);

  for (let o = 0; o < order.length; o++) {
    const pi = targeted[order[o] * 2];  // particle index

    // Search 5×5 cell neighborhood around OLD target
    const cx = Math.min(cols - 1, Math.max(0, (tx[pi] / ACELL) | 0));
    const cy = Math.min(rows - 1, Math.max(0, (ty[pi] / ACELL) | 0));
    let bestI = -1, bestD = Infinity;

    for (let dy = -SEARCH_R; dy <= SEARCH_R; dy++) {
      for (let dx = -SEARCH_R; dx <= SEARCH_R; dx++) {
        const gx = cx + dx, gy = cy + dy;
        if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) continue;
        const cell = grid[gy * cols + gx];
        for (let k = 0; k < cell.length; k++) {
          const ti = cell[k];
          if (poolUsed[ti]) continue;
          const ddx = poolX[ti] - tx[pi], ddy = poolY[ti] - ty[pi];
          const d = ddx * ddx + ddy * ddy;
          if (d < bestD) { bestD = d; bestI = ti; }
        }
      }
    }

    if (bestI >= 0) {
      poolUsed[bestI] = 1;
      tx[pi] = poolX[bestI];
      ty[pi] = poolY[bestI];
    } else {
      tx[pi] = -1;   // no nearby target → goes to Phase 2
      ty[pi] = -1;
    }
  }

  // ── Phase 2: remaining targets ↔ remaining particles via grid-sort ──
  const remT = [];
  for (let i = 0; i < COUNT; i++) { if (!poolUsed[i]) remT.push(i); }
  const wand = [];
  for (let i = 0; i < COUNT; i++) { if (tx[i] < 0) wand.push(i); }

  const ck = (x, y) => (((y / ACELL) | 0) * cols + ((x / ACELL) | 0));
  remT.sort((a, b) => ck(poolX[a], poolY[a]) - ck(poolX[b], poolY[b]));
  wand.sort((a, b) => ck(px[a], py[a]) - ck(px[b], py[b]));

  const n = Math.min(remT.length, wand.length);
  for (let i = 0; i < n; i++) {
    tx[wand[i]] = poolX[remT[i]];
    ty[wand[i]] = poolY[remT[i]];
  }
}

function clearTargets() {
  for (let i = 0; i < COUNT; i++) {
    if (tx[i] >= 0) {
      const a = Math.random() * Math.PI * 2;
      const f = 0.3 + Math.random() * 0.5;
      vx[i] += Math.cos(a) * f;
      vy[i] += Math.sin(a) * f;
    }
    tx[i] = -1;
    ty[i] = -1;
  }
}

// ── Simulation ────────────────────────────────────────────────────────────────
let tick = 0;

function update() {
  tick++;
  const mr2 = MOUSE_R * MOUSE_R;

  for (let i = 0; i < COUNT; i++) {
    if (tx[i] >= 0) {
      const dx = tx[i] - px[i];
      const dy = ty[i] - py[i];
      const d2 = dx * dx + dy * dy;
      const sp = d2 > NEAR_DIST2 ? SPRING_FAR : SPRING_NEAR;
      const fr = d2 > NEAR_DIST2 ? FRIC_FAR   : FRIC_NEAR;
      vx[i] = (vx[i] + dx * sp) * fr;
      vy[i] = (vy[i] + dy * sp) * fr;
    } else {
      angle[i] += (Math.random() - 0.5) * turnSpd[i];
      vx[i] = (vx[i] + Math.cos(angle[i]) * wandAcc[i]) * WANDER_F;
      vy[i] = (vy[i] + Math.sin(angle[i]) * wandAcc[i]) * WANDER_F;
    }

    // Mouse repulsion
    const mdx = px[i] - mouseX;
    const mdy = py[i] - mouseY;
    const md2 = mdx * mdx + mdy * mdy;
    if (md2 < mr2 && md2 > 1) {
      const dist  = Math.sqrt(md2);
      const force = (1 - dist / MOUSE_R) * MOUSE_F;
      vx[i] += (mdx / dist) * force;
      vy[i] += (mdy / dist) * force;
    }

    px[i] += vx[i];
    py[i] += vy[i];

    if      (px[i] < -6)     px[i] = W + 6;
    else if (px[i] > W + 6)  px[i] = -6;
    if      (py[i] < -6)     py[i] = H + 6;
    else if (py[i] > H + 6)  py[i] = -6;
  }
}

// ── Render (3 alpha layers, batched) ──────────────────────────────────────────
const LAYER_ALPHA = [0.28, 0.52, 0.78];

function draw() {
  ctx.fillStyle = 'rgba(8, 8, 16, 0.22)';
  ctx.fillRect(0, 0, W, H);

  for (let l = 0; l < 3; l++) {
    ctx.fillStyle = `rgba(255,255,255,${LAYER_ALPHA[l]})`;
    ctx.beginPath();
    for (let i = 0; i < COUNT; i++) {
      if (layer[i] !== l) continue;
      const s = psize[i];
      ctx.rect(px[i] - s * 0.5, py[i] - s * 0.5, s, s);
    }
    ctx.fill();
  }
}

// ── Loop ──────────────────────────────────────────────────────────────────────
let lastW = W, lastH = H;

function loop() {
  resize();
  if (W !== lastW || H !== lastH) {
    if (lastW === 0 || lastH === 0) {
      for (let i = 0; i < COUNT; i++) {
        px[i] = Math.random() * W;
        py[i] = Math.random() * H;
      }
    }
    lastW = W; lastH = H;
  }
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ── Input ─────────────────────────────────────────────────────────────────────
let debounceTimer = null;

function scheduleAssign(text) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    if (text.trim()) assignTargets(text);
    else             clearTargets();
  }, 100);
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  scheduleAssign(input.value);
});
</script>
</body>
</html>
